<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" role="img" aria-hidden="true">
  <defs>
    <style>
      /* Network pulse animations */
      @keyframes heroPulse1 {
        0%, 100% { r: 80; opacity: 0.06; }
        50% { r: 120; opacity: 0.12; }
      }
      @keyframes heroPulse2 {
        0%, 100% { r: 60; opacity: 0.05; }
        50% { r: 100; opacity: 0.1; }
      }
      @keyframes heroPulse3 {
        0%, 100% { r: 100; opacity: 0.04; }
        50% { r: 160; opacity: 0.08; }
      }
      @keyframes heroNodePulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.7; }
      }
      @keyframes heroFlowDot1 {
        0% { offset-distance: 0%; opacity: 0; }
        10% { opacity: 0.6; }
        90% { opacity: 0.6; }
        100% { offset-distance: 100%; opacity: 0; }
      }
      @keyframes heroFlowDot2 {
        0% { offset-distance: 0%; opacity: 0; }
        10% { opacity: 0.5; }
        90% { opacity: 0.5; }
        100% { offset-distance: 100%; opacity: 0; }
      }

      .hero-pulse-1 { animation: heroPulse1 6s ease-in-out infinite; }
      .hero-pulse-2 { animation: heroPulse2 7s ease-in-out infinite 1s; }
      .hero-pulse-3 { animation: heroPulse3 8s ease-in-out infinite 2s; }
      .hero-node-pulse { animation: heroNodePulse 3s ease-in-out infinite; }
      .hero-node-pulse-delay { animation: heroNodePulse 3s ease-in-out infinite 1.5s; }

      .hero-flow-1 {
        animation: heroFlowDot1 4s ease-in-out infinite;
        offset-path: path('M 300 400 C 500 350, 700 500, 960 540');
      }
      .hero-flow-2 {
        animation: heroFlowDot2 5s ease-in-out infinite 1s;
        offset-path: path('M 960 540 C 1200 500, 1400 600, 1620 480');
      }
      .hero-flow-3 {
        animation: heroFlowDot1 4.5s ease-in-out infinite 2s;
        offset-path: path('M 600 700 C 750 650, 850 580, 960 540');
      }
      .hero-flow-4 {
        animation: heroFlowDot2 5.5s ease-in-out infinite 0.5s;
        offset-path: path('M 960 540 C 1100 580, 1250 520, 1400 700');
      }

      @media (prefers-reduced-motion: reduce) {
        .hero-pulse-1, .hero-pulse-2, .hero-pulse-3,
        .hero-node-pulse, .hero-node-pulse-delay,
        .hero-flow-1, .hero-flow-2, .hero-flow-3, .hero-flow-4 {
          animation: none !important;
        }
        .hero-pulse-1, .hero-pulse-2, .hero-pulse-3 { opacity: 0.06; }
        .hero-node-pulse, .hero-node-pulse-delay { opacity: 0.4; }
        .hero-flow-1, .hero-flow-2, .hero-flow-3, .hero-flow-4 { display: none; }
      }
    </style>

    <radialGradient id="heroBg" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#04070d"/>
    </radialGradient>
    <radialGradient id="heroGlow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2b78ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#2b78ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="heroGlow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#56b7ff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#56b7ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="heroLineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2b78ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#2b78ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#2b78ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="heroLineGradV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2b78ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#2b78ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#2b78ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#heroBg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04">
    <line x1="0" y1="216" x2="1920" y2="216" stroke="#2b78ff" stroke-width="0.5"/>
    <line x1="0" y1="432" x2="1920" y2="432" stroke="#2b78ff" stroke-width="0.5"/>
    <line x1="0" y1="648" x2="1920" y2="648" stroke="#2b78ff" stroke-width="0.5"/>
    <line x1="0" y1="864" x2="1920" y2="864" stroke="#2b78ff" stroke-width="0.5"/>
    <line x1="384" y1="0" x2="384" y2="1080" stroke="#2b78ff" stroke-width="0.5"/>
    <line x1="768" y1="0" x2="768" y2="1080" stroke="#2b78ff" stroke-width="0.5"/>
    <line x1="1152" y1="0" x2="1152" y2="1080" stroke="#2b78ff" stroke-width="0.5"/>
    <line x1="1536" y1="0" x2="1536" y2="1080" stroke="#2b78ff" stroke-width="0.5"/>
  </g>

  <!-- Gradient lines (horizontal) -->
  <line x1="0" y1="540" x2="1920" y2="540" stroke="url(#heroLineGrad)" stroke-width="1"/>
  <line x1="0" y1="360" x2="1920" y2="360" stroke="url(#heroLineGrad)" stroke-width="0.5"/>
  <line x1="0" y1="720" x2="1920" y2="720" stroke="url(#heroLineGrad)" stroke-width="0.5"/>

  <!-- Gradient lines (vertical) -->
  <line x1="960" y1="0" x2="960" y2="1080" stroke="url(#heroLineGradV)" stroke-width="1"/>

  <!-- Animated pulse rings from center -->
  <circle class="hero-pulse-1" cx="960" cy="540" r="80" fill="none" stroke="#2b78ff" stroke-width="1"/>
  <circle class="hero-pulse-2" cx="960" cy="540" r="60" fill="none" stroke="#56b7ff" stroke-width="0.8"/>
  <circle class="hero-pulse-3" cx="960" cy="540" r="100" fill="none" stroke="#2b78ff" stroke-width="0.6"/>

  <!-- Ambient glow spots -->
  <circle cx="960" cy="540" r="200" fill="url(#heroGlow1)"/>
  <circle cx="300" cy="400" r="150" fill="url(#heroGlow2)" opacity="0.5"/>
  <circle cx="1620" cy="480" r="120" fill="url(#heroGlow2)" opacity="0.4"/>

  <!-- Network connection lines -->
  <g opacity="0.08" stroke="#2b78ff" stroke-width="0.8">
    <path d="M 300 400 C 500 350, 700 500, 960 540" fill="none"/>
    <path d="M 960 540 C 1200 500, 1400 600, 1620 480" fill="none"/>
    <path d="M 600 700 C 750 650, 850 580, 960 540" fill="none"/>
    <path d="M 960 540 C 1100 580, 1250 520, 1400 700" fill="none"/>
    <path d="M 200 250 C 350 300, 450 380, 600 400" fill="none"/>
    <path d="M 1300 300 C 1400 350, 1500 400, 1620 480" fill="none"/>
  </g>

  <!-- Network nodes -->
  <g>
    <!-- Center node -->
    <circle cx="960" cy="540" r="4" fill="#111a2c" stroke="#2b78ff" stroke-width="1.5"/>
    <circle cx="960" cy="540" r="1.5" fill="#56b7ff" class="hero-node-pulse"/>
    <!-- Secondary nodes -->
    <circle cx="300" cy="400" r="3" fill="#111a2c" stroke="#2b78ff" stroke-width="1"/>
    <circle cx="300" cy="400" r="1" fill="#2b78ff" class="hero-node-pulse-delay"/>
    <circle cx="1620" cy="480" r="3" fill="#111a2c" stroke="#2b78ff" stroke-width="1"/>
    <circle cx="1620" cy="480" r="1" fill="#2b78ff" class="hero-node-pulse"/>
    <circle cx="600" cy="700" r="2.5" fill="#111a2c" stroke="#56b7ff" stroke-width="0.8"/>
    <circle cx="600" cy="700" r="0.8" fill="#56b7ff" class="hero-node-pulse-delay"/>
    <circle cx="1400" cy="700" r="2.5" fill="#111a2c" stroke="#56b7ff" stroke-width="0.8"/>
    <circle cx="1400" cy="700" r="0.8" fill="#56b7ff" class="hero-node-pulse"/>
    <circle cx="600" cy="400" r="2" fill="#111a2c" stroke="#2b78ff" stroke-width="0.6" opacity="0.5"/>
    <circle cx="1300" cy="300" r="2" fill="#111a2c" stroke="#2b78ff" stroke-width="0.6" opacity="0.5"/>
  </g>

  <!-- Flowing data particles -->
  <circle class="hero-flow-1" cx="0" cy="0" r="2" fill="#2b78ff"/>
  <circle class="hero-flow-2" cx="0" cy="0" r="2" fill="#56b7ff"/>
  <circle class="hero-flow-3" cx="0" cy="0" r="1.5" fill="#2b78ff"/>
  <circle class="hero-flow-4" cx="0" cy="0" r="1.5" fill="#56b7ff"/>

  <!-- Scatter micro-dots for texture -->
  <g opacity="0.06" fill="#2b78ff">
    <circle cx="150" cy="200" r="1"/>
    <circle cx="400" cy="150" r="0.8"/>
    <circle cx="700" cy="300" r="1"/>
    <circle cx="1100" cy="200" r="0.8"/>
    <circle cx="1500" cy="350" r="1"/>
    <circle cx="1750" cy="250" r="0.8"/>
    <circle cx="250" cy="800" r="1"/>
    <circle cx="500" cy="900" r="0.8"/>
    <circle cx="800" cy="850" r="1"/>
    <circle cx="1200" cy="900" r="0.8"/>
    <circle cx="1600" cy="800" r="1"/>
    <circle cx="1800" cy="700" r="0.8"/>
  </g>
</svg>
