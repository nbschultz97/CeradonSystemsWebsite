<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <style>
      @keyframes pulse-ring-1 {
        0% { r: 0; opacity: 0.8; }
        100% { r: 400; opacity: 0; }
      }
      @keyframes pulse-ring-2 {
        0% { r: 0; opacity: 0.6; }
        100% { r: 500; opacity: 0; }
      }
      @keyframes pulse-ring-3 {
        0% { r: 0; opacity: 0.4; }
        100% { r: 600; opacity: 0; }
      }
      @keyframes scan-sweep {
        0% { transform: rotate(0deg); opacity: 0.3; }
        50% { opacity: 0.6; }
        100% { transform: rotate(360deg); opacity: 0.3; }
      }
      @keyframes scan-line-1 {
        0% { y1: 0; y2: 0; opacity: 0.4; }
        50% { opacity: 0.8; }
        100% { y1: 1080; y2: 1080; opacity: 0.4; }
      }
      @keyframes scan-line-2 {
        0% { x1: 0; x2: 0; opacity: 0.3; }
        50% { opacity: 0.7; }
        100% { x1: 1920; x2: 1920; opacity: 0.3; }
      }

      .pulse-ring-1 {
        animation: pulse-ring-1 4s ease-out infinite;
        fill: none;
        stroke: #2b78ff;
        stroke-width: 2;
      }
      .pulse-ring-2 {
        animation: pulse-ring-2 4s ease-out infinite 1.3s;
        fill: none;
        stroke: #56b7ff;
        stroke-width: 1.5;
      }
      .pulse-ring-3 {
        animation: pulse-ring-3 4s ease-out infinite 2.6s;
        fill: none;
        stroke: #2b78ff;
        stroke-width: 1;
      }
      .scan-sweep {
        animation: scan-sweep 8s linear infinite;
        transform-origin: 960px 540px;
      }
      .scan-line-vert {
        animation: scan-line-1 6s ease-in-out infinite;
        stroke: #2b78ff;
        stroke-width: 1;
      }
      .scan-line-horiz {
        animation: scan-line-2 7s ease-in-out infinite;
        stroke: #56b7ff;
        stroke-width: 0.5;
      }

      @media (prefers-reduced-motion: reduce) {
        .pulse-ring-1, .pulse-ring-2, .pulse-ring-3,
        .scan-sweep, .scan-line-vert, .scan-line-horiz {
          animation: none;
          opacity: 0.2;
        }
      }
    </style>

    <radialGradient id="bg-gradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0b0d10;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#04070d;stop-opacity:1" />
    </radialGradient>

    <linearGradient id="sweep-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2b78ff;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#2b78ff;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#2b78ff;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg-gradient)"/>

  <!-- Pulsing RF Wave Rings - Center Point -->
  <g id="rf-waves">
    <circle class="pulse-ring-1" cx="960" cy="540" r="0"/>
    <circle class="pulse-ring-2" cx="960" cy="540" r="0"/>
    <circle class="pulse-ring-3" cx="960" cy="540" r="0"/>
  </g>

  <!-- Scanning Sweep -->
  <g class="scan-sweep">
    <line x1="960" y1="540" x2="1360" y2="540" stroke="url(#sweep-gradient)" stroke-width="2"/>
  </g>

  <!-- Scanning Lines -->
  <line class="scan-line-vert" x1="640" y1="0" x2="640" y2="0"/>
  <line class="scan-line-horiz" x1="0" y1="360" x2="0" y2="360"/>

  <!-- Subtle Grid Pattern -->
  <g opacity="0.03">
    <path d="M0,0 L1920,0 L1920,1080 L0,1080 Z" fill="none" stroke="#2b78ff" stroke-width="0.5"/>
    <line x1="0" y1="270" x2="1920" y2="270" stroke="#2b78ff" stroke-width="0.3"/>
    <line x1="0" y1="540" x2="1920" y2="540" stroke="#2b78ff" stroke-width="0.3"/>
    <line x1="0" y1="810" x2="1920" y2="810" stroke="#2b78ff" stroke-width="0.3"/>
    <line x1="480" y1="0" x2="480" y2="1080" stroke="#2b78ff" stroke-width="0.3"/>
    <line x1="960" y1="0" x2="960" y2="1080" stroke="#2b78ff" stroke-width="0.3"/>
    <line x1="1440" y1="0" x2="1440" y2="1080" stroke="#2b78ff" stroke-width="0.3"/>
  </g>
</svg>