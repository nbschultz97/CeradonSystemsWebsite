<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <style>
      .grid-line {
        stroke: #2b78ff;
        stroke-width: 0.5;
        opacity: 0.3;
      }
      .node {
        fill: #2b78ff;
      }
      .connection {
        stroke: #56b7ff;
        stroke-width: 1.5;
        stroke-linecap: round;
      }
      .blueprint-border {
        stroke: #2b78ff;
        stroke-width: 2;
        fill: none;
      }
    </style>
  </defs>

  <!-- Blueprint Border -->
  <rect class="blueprint-border" x="8" y="8" width="48" height="48" rx="2"/>

  <!-- Grid Lines -->
  <line class="grid-line" x1="8" y1="20" x2="56" y2="20"/>
  <line class="grid-line" x1="8" y1="32" x2="56" y2="32"/>
  <line class="grid-line" x1="8" y1="44" x2="56" y2="44"/>
  <line class="grid-line" x1="20" y1="8" x2="20" y2="56"/>
  <line class="grid-line" x1="32" y1="8" x2="32" y2="56"/>
  <line class="grid-line" x1="44" y1="8" x2="44" y2="56"/>

  <!-- Network Connections -->
  <line class="connection" x1="16" y1="16" x2="32" y2="24"/>
  <line class="connection" x1="32" y1="24" x2="48" y2="16"/>
  <line class="connection" x1="16" y1="16" x2="20" y2="40"/>
  <line class="connection" x1="48" y1="16" x2="44" y2="40"/>
  <line class="connection" x1="20" y1="40" x2="32" y2="48"/>
  <line class="connection" x1="44" y1="40" x2="32" y2="48"/>
  <line class="connection" x1="32" y1="24" x2="32" y2="48"/>

  <!-- Nodes -->
  <circle class="node" cx="16" cy="16" r="2.5"/>
  <circle class="node" cx="48" cy="16" r="2.5"/>
  <circle class="node" cx="32" cy="24" r="3"/>
  <circle class="node" cx="20" cy="40" r="2.5"/>
  <circle class="node" cx="44" cy="40" r="2.5"/>
  <circle class="node" cx="32" cy="48" r="3"/>

  <!-- Center Highlight -->
  <circle cx="32" cy="24" r="1.5" fill="#56b7ff"/>
  <circle cx="32" cy="48" r="1.5" fill="#56b7ff"/>
</svg>