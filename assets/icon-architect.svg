<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Architect Stack infrastructure">
  <defs>
    <linearGradient id="arcNodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2b78ff"/>
      <stop offset="100%" stop-color="#56b7ff"/>
    </linearGradient>
    <linearGradient id="arcLineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2b78ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#56b7ff" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="arcGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="arcNodeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Isometric grid base -->
  <g opacity="0.12">
    <line x1="8" y1="44" x2="32" y2="56" stroke="#2b78ff" stroke-width="0.4"/>
    <line x1="32" y1="56" x2="56" y2="44" stroke="#2b78ff" stroke-width="0.4"/>
    <line x1="8" y1="38" x2="32" y2="50" stroke="#2b78ff" stroke-width="0.4"/>
    <line x1="32" y1="50" x2="56" y2="38" stroke="#2b78ff" stroke-width="0.4"/>
    <line x1="8" y1="32" x2="32" y2="44" stroke="#2b78ff" stroke-width="0.4"/>
    <line x1="32" y1="44" x2="56" y2="32" stroke="#2b78ff" stroke-width="0.4"/>
    <line x1="20" y1="35" x2="20" y2="47" stroke="#2b78ff" stroke-width="0.3"/>
    <line x1="32" y1="41" x2="32" y2="56" stroke="#2b78ff" stroke-width="0.3"/>
    <line x1="44" y1="35" x2="44" y2="47" stroke="#2b78ff" stroke-width="0.3"/>
  </g>

  <!-- Network connections -->
  <g stroke="url(#arcLineGrad)" stroke-width="0.8" fill="none" filter="url(#arcGlow)">
    <line x1="32" y1="28" x2="14" y2="18"/>
    <line x1="32" y1="28" x2="50" y2="18"/>
    <line x1="32" y1="28" x2="14" y2="40"/>
    <line x1="32" y1="28" x2="50" y2="40"/>
    <line x1="32" y1="28" x2="32" y2="10"/>
    <line x1="32" y1="28" x2="32" y2="48"/>
    <line x1="14" y1="18" x2="32" y2="10"/>
    <line x1="50" y1="18" x2="32" y2="10"/>
    <line x1="14" y1="40" x2="32" y2="48"/>
    <line x1="50" y1="40" x2="32" y2="48"/>
    <line x1="14" y1="18" x2="14" y2="40"/>
    <line x1="50" y1="18" x2="50" y2="40"/>
  </g>

  <!-- Central hub node -->
  <g filter="url(#arcNodeGlow)">
    <circle cx="32" cy="28" r="4.5" fill="#111a2c" stroke="url(#arcNodeGrad)" stroke-width="1.5"/>
    <circle cx="32" cy="28" r="2" fill="url(#arcNodeGrad)"/>
  </g>

  <!-- Primary nodes -->
  <g filter="url(#arcGlow)">
    <circle cx="32" cy="10" r="3" fill="#111a2c" stroke="#2b78ff" stroke-width="1"/>
    <circle cx="32" cy="10" r="1.2" fill="#2b78ff"/>
    <circle cx="14" cy="18" r="3" fill="#111a2c" stroke="#2b78ff" stroke-width="1"/>
    <circle cx="14" cy="18" r="1.2" fill="#2b78ff"/>
    <circle cx="50" cy="18" r="3" fill="#111a2c" stroke="#2b78ff" stroke-width="1"/>
    <circle cx="50" cy="18" r="1.2" fill="#2b78ff"/>
    <circle cx="14" cy="40" r="3" fill="#111a2c" stroke="#56b7ff" stroke-width="1" opacity="0.8"/>
    <circle cx="14" cy="40" r="1.2" fill="#56b7ff" opacity="0.8"/>
    <circle cx="50" cy="40" r="3" fill="#111a2c" stroke="#56b7ff" stroke-width="1" opacity="0.8"/>
    <circle cx="50" cy="40" r="1.2" fill="#56b7ff" opacity="0.8"/>
    <circle cx="32" cy="48" r="3" fill="#111a2c" stroke="#56b7ff" stroke-width="1" opacity="0.7"/>
    <circle cx="32" cy="48" r="1.2" fill="#56b7ff" opacity="0.7"/>
  </g>

  <!-- Secondary micro-nodes -->
  <circle cx="23" cy="13" r="1" fill="#2b78ff" opacity="0.4"/>
  <circle cx="41" cy="13" r="1" fill="#2b78ff" opacity="0.4"/>
  <circle cx="23" cy="44" r="1" fill="#56b7ff" opacity="0.3"/>
  <circle cx="41" cy="44" r="1" fill="#56b7ff" opacity="0.3"/>
  <circle cx="8" cy="29" r="1" fill="#2b78ff" opacity="0.25"/>
  <circle cx="56" cy="29" r="1" fill="#2b78ff" opacity="0.25"/>
</svg>
