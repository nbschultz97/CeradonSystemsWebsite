<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Aegis battery readiness">
  <defs>
    <linearGradient id="aShieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18243a"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="aShieldEdge" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#2b78ff" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#2b78ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#56b7ff" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="aBattGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#2b78ff"/>
      <stop offset="100%" stop-color="#56b7ff"/>
    </linearGradient>
    <linearGradient id="aBoltGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#f4f6fb"/>
      <stop offset="100%" stop-color="#56b7ff"/>
    </linearGradient>
    <filter id="aGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="aBoltGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Shield shape -->
  <path d="M 32 6 L 52 14 L 52 30 Q 52 48, 32 58 Q 12 48, 12 30 L 12 14 Z"
        fill="url(#aShieldGrad)" stroke="url(#aShieldEdge)" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Shield inner line -->
  <path d="M 32 10 L 48 16 L 48 30 Q 48 44, 32 54 Q 16 44, 16 30 L 16 16 Z"
        fill="none" stroke="#202f46" stroke-width="0.5" opacity="0.5"/>

  <!-- Battery outline inside shield -->
  <g transform="translate(23, 18)" filter="url(#aGlow)">
    <rect x="0" y="2" width="18" height="28" rx="2" fill="none" stroke="#2b78ff" stroke-width="1.2"/>
    <!-- Battery terminal -->
    <rect x="5" y="0" width="8" height="3" rx="1" fill="none" stroke="#2b78ff" stroke-width="1"/>
    <!-- Battery level bars (3 segments = full charge) -->
    <rect x="3" y="22" width="12" height="5" rx="0.5" fill="url(#aBattGrad)" opacity="0.9"/>
    <rect x="3" y="15" width="12" height="5" rx="0.5" fill="url(#aBattGrad)" opacity="0.7"/>
    <rect x="3" y="8" width="12" height="5" rx="0.5" fill="url(#aBattGrad)" opacity="0.5"/>
  </g>

  <!-- Lightning bolt overlay -->
  <g filter="url(#aBoltGlow)">
    <path d="M 35 20 L 29 32 L 33 32 L 31 44 L 37 32 L 33 32 L 35 20 Z"
          fill="url(#aBoltGrad)" opacity="0.85"/>
  </g>

  <!-- Status indicators -->
  <circle cx="20" cy="48" r="1.5" fill="#2b78ff" opacity="0.6"/>
  <circle cx="32" cy="52" r="1.5" fill="#56b7ff" opacity="0.5"/>
  <circle cx="44" cy="48" r="1.5" fill="#2b78ff" opacity="0.6"/>

  <!-- Connecting arcs between indicators -->
  <path d="M 21.5 48 Q 26 50, 30.5 52" fill="none" stroke="#2b78ff" stroke-width="0.4" opacity="0.3"/>
  <path d="M 33.5 52 Q 38 50, 42.5 48" fill="none" stroke="#2b78ff" stroke-width="0.4" opacity="0.3"/>
</svg>
