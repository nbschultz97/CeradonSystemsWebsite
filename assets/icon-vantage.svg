<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <style>
      .wave {
        stroke: #2b78ff;
        stroke-width: 1.5;
        fill: none;
        stroke-linecap: round;
      }
      .wall {
        fill: #c5cbd6;
        opacity: 0.3;
      }
      .wave-fade {
        stroke: #56b7ff;
        opacity: 0.6;
      }
    </style>
  </defs>

  <!-- Wall -->
  <rect class="wall" x="28" y="8" width="8" height="48" rx="1"/>

  <!-- RF Waves - Left Side (before wall) -->
  <path class="wave" d="M 12 32 Q 16 26, 20 32 Q 24 38, 28 32"/>
  <path class="wave wave-fade" d="M 8 32 Q 14 22, 20 32 Q 26 42, 32 32"/>
  <path class="wave wave-fade" d="M 4 32 Q 12 18, 20 32 Q 28 46, 36 32"/>

  <!-- RF Waves - Right Side (penetrating through wall) -->
  <path class="wave" d="M 36 32 Q 40 26, 44 32 Q 48 38, 52 32"/>
  <path class="wave wave-fade" d="M 36 32 Q 42 22, 48 32 Q 54 42, 60 32"/>

  <!-- Center Transmitter Point -->
  <circle cx="14" cy="32" r="2" fill="#2b78ff"/>
  <circle cx="14" cy="32" r="1" fill="#56b7ff"/>
</svg>