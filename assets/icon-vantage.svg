<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Vantage through-wall sensing">
  <defs>
    <linearGradient id="vWallGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#18243a"/>
      <stop offset="50%" stop-color="#111a2c"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="vWaveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2b78ff"/>
      <stop offset="100%" stop-color="#56b7ff"/>
    </linearGradient>
    <linearGradient id="vGlowGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#56b7ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#2b78ff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="vEmitter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#56b7ff"/>
      <stop offset="40%" stop-color="#2b78ff"/>
      <stop offset="100%" stop-color="#2b78ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="vGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="vSoftGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="vRightClip">
      <rect x="35" y="0" width="29" height="64"/>
    </clipPath>
    <clipPath id="vLeftClip">
      <rect x="0" y="0" width="29" height="64"/>
    </clipPath>
  </defs>

  <!-- Wall structure -->
  <rect x="27" y="6" width="10" height="52" rx="1" fill="url(#vWallGrad)" stroke="#202f46" stroke-width="0.5"/>
  <!-- Wall cross-section lines -->
  <line x1="29" y1="6" x2="29" y2="58" stroke="#202f46" stroke-width="0.3" opacity="0.5"/>
  <line x1="35" y1="6" x2="35" y2="58" stroke="#202f46" stroke-width="0.3" opacity="0.5"/>
  <!-- Wall rebar dots -->
  <circle cx="31" cy="16" r="0.8" fill="#2a3a55" opacity="0.6"/>
  <circle cx="33" cy="26" r="0.8" fill="#2a3a55" opacity="0.6"/>
  <circle cx="31" cy="36" r="0.8" fill="#2a3a55" opacity="0.6"/>
  <circle cx="33" cy="46" r="0.8" fill="#2a3a55" opacity="0.6"/>

  <!-- Emitter point (left side) -->
  <circle cx="10" cy="32" r="3" fill="url(#vEmitter)" filter="url(#vSoftGlow)"/>
  <circle cx="10" cy="32" r="1.2" fill="#f4f6fb"/>

  <!-- RF waves - left side (before wall) -->
  <g clip-path="url(#vLeftClip)" filter="url(#vGlow)">
    <path d="M 10 32 m 5 0 a 5 5 0 0 1 0 -8 a 5 5 0 0 1 0 8" fill="none" stroke="url(#vWaveGrad)" stroke-width="1.2" opacity="0.9"/>
    <path d="M 10 32 m 9 0 a 9 9 0 0 1 0 -14 a 9 9 0 0 1 0 14" fill="none" stroke="url(#vWaveGrad)" stroke-width="1" opacity="0.7"/>
    <path d="M 10 32 m 13 0 a 13 13 0 0 1 0 -20 a 13 13 0 0 1 0 20" fill="none" stroke="url(#vWaveGrad)" stroke-width="0.8" opacity="0.5"/>
    <path d="M 10 32 m 17 0 a 17 17 0 0 1 0 -26 a 17 17 0 0 1 0 26" fill="none" stroke="url(#vWaveGrad)" stroke-width="0.6" opacity="0.3"/>
  </g>

  <!-- RF penetration through wall (subtle glow) -->
  <rect x="28" y="24" width="8" height="16" fill="url(#vGlowGrad)" opacity="0.3"/>

  <!-- RF waves - right side (through wall, attenuated) -->
  <g clip-path="url(#vRightClip)" filter="url(#vGlow)">
    <path d="M 32 32 m 5 0 a 5 5 0 0 0 0 -7 a 5 5 0 0 0 0 7" fill="none" stroke="#56b7ff" stroke-width="0.9" opacity="0.6"/>
    <path d="M 32 32 m 9 0 a 9 9 0 0 0 0 -12 a 9 9 0 0 0 0 12" fill="none" stroke="#56b7ff" stroke-width="0.7" opacity="0.4"/>
    <path d="M 32 32 m 13 0 a 13 13 0 0 0 0 -18 a 13 13 0 0 0 0 18" fill="none" stroke="#56b7ff" stroke-width="0.5" opacity="0.25"/>
  </g>

  <!-- Detected figure silhouette (right side) -->
  <g transform="translate(50, 22)" opacity="0.7" filter="url(#vGlow)">
    <!-- Head -->
    <circle cx="0" cy="0" r="3" fill="none" stroke="#56b7ff" stroke-width="0.8"/>
    <!-- Body -->
    <line x1="0" y1="3" x2="0" y2="12" stroke="#56b7ff" stroke-width="0.8"/>
    <!-- Arms -->
    <line x1="-4" y1="6" x2="4" y2="6" stroke="#56b7ff" stroke-width="0.7"/>
    <!-- Legs -->
    <line x1="0" y1="12" x2="-3" y2="18" stroke="#56b7ff" stroke-width="0.7"/>
    <line x1="0" y1="12" x2="3" y2="18" stroke="#56b7ff" stroke-width="0.7"/>
    <!-- Detection highlight dots -->
    <circle cx="0" cy="0" r="1" fill="#56b7ff" opacity="0.5"/>
    <circle cx="0" cy="6" r="0.8" fill="#56b7ff" opacity="0.4"/>
    <circle cx="0" cy="12" r="0.8" fill="#56b7ff" opacity="0.3"/>
  </g>
</svg>
