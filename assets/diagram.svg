<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Vantage Architecture Pipeline diagram">
  <defs>
    <style>
      /* Module box styling */
      .dg-box {
        fill: #0b1220;
        stroke: #2b78ff;
        stroke-width: 1.5;
        rx: 6;
      }
      .dg-box-inner {
        fill: #111a2c;
        stroke: #18243a;
        stroke-width: 0.5;
        rx: 4;
      }
      .dg-label {
        fill: #f4f6fb;
        font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        font-size: 15px;
        font-weight: 600;
        text-anchor: middle;
      }
      .dg-sublabel {
        fill: #80889a;
        font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        font-size: 10px;
        text-anchor: middle;
      }
      .dg-title {
        fill: #2b78ff;
        font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        font-size: 18px;
        font-weight: 700;
        text-anchor: middle;
        letter-spacing: 2px;
      }
      .dg-conn-label {
        fill: #56b7ff;
        font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        font-size: 9px;
        text-anchor: middle;
        letter-spacing: 1px;
        text-transform: uppercase;
      }

      /* Connection arrows */
      .dg-conn {
        stroke: #2b78ff;
        stroke-width: 1.5;
        fill: none;
        stroke-dasharray: 4 2;
        opacity: 0.5;
      }
      .dg-conn-solid {
        stroke: #2b78ff;
        stroke-width: 2;
        fill: none;
        opacity: 0.3;
      }

      /* Data flow particles */
      @keyframes dgFlow1 {
        0% { offset-distance: 0%; opacity: 0; }
        8% { opacity: 0.9; }
        92% { opacity: 0.9; }
        100% { offset-distance: 100%; opacity: 0; }
      }
      @keyframes dgFlow2 {
        0% { offset-distance: 0%; opacity: 0; }
        8% { opacity: 0.8; }
        92% { opacity: 0.8; }
        100% { offset-distance: 100%; opacity: 0; }
      }
      @keyframes dgNodePulse {
        0%, 100% { opacity: 0.2; }
        50% { opacity: 0.5; }
      }

      .dg-particle-1 {
        animation: dgFlow1 2.5s ease-in-out infinite;
        offset-path: path('M 155 200 L 295 200');
      }
      .dg-particle-2 {
        animation: dgFlow1 2.5s ease-in-out infinite 0.5s;
        offset-path: path('M 435 200 L 575 200');
      }
      .dg-particle-3 {
        animation: dgFlow1 2.5s ease-in-out infinite 1s;
        offset-path: path('M 715 200 L 855 200');
      }
      .dg-particle-4 {
        animation: dgFlow2 2.5s ease-in-out infinite 1.5s;
        offset-path: path('M 995 200 Q 1020 170, 1045 140');
      }
      .dg-particle-5 {
        animation: dgFlow2 2.5s ease-in-out infinite 2s;
        offset-path: path('M 995 200 Q 1020 230, 1045 250');
      }
      /* Secondary particles (offset timing) */
      .dg-particle-1b {
        animation: dgFlow1 2.5s ease-in-out infinite 1.25s;
        offset-path: path('M 155 200 L 295 200');
      }
      .dg-particle-2b {
        animation: dgFlow1 2.5s ease-in-out infinite 1.75s;
        offset-path: path('M 435 200 L 575 200');
      }
      .dg-particle-3b {
        animation: dgFlow1 2.5s ease-in-out infinite 2.25s;
        offset-path: path('M 715 200 L 855 200');
      }

      .dg-status-pulse { animation: dgNodePulse 2s ease-in-out infinite; }
      .dg-status-pulse-d { animation: dgNodePulse 2s ease-in-out infinite 0.5s; }
      .dg-status-pulse-d2 { animation: dgNodePulse 2s ease-in-out infinite 1s; }
      .dg-status-pulse-d3 { animation: dgNodePulse 2s ease-in-out infinite 1.5s; }

      @media (prefers-reduced-motion: reduce) {
        .dg-particle-1, .dg-particle-2, .dg-particle-3,
        .dg-particle-4, .dg-particle-5,
        .dg-particle-1b, .dg-particle-2b, .dg-particle-3b,
        .dg-status-pulse, .dg-status-pulse-d,
        .dg-status-pulse-d2, .dg-status-pulse-d3 {
          animation: none !important;
          display: none;
        }
      }
    </style>

    <!-- Arrowhead -->
    <marker id="dgArrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2b78ff" opacity="0.6"/>
    </marker>

    <!-- Module box glow -->
    <filter id="dgBoxGlow" x="-8%" y="-8%" width="116%" height="116%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="#04070d" rx="8"/>

  <!-- Subtle background grid -->
  <g opacity="0.03">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#2b78ff" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#2b78ff" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#2b78ff" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="400" stroke="#2b78ff" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="400" stroke="#2b78ff" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="400" stroke="#2b78ff" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="400" stroke="#2b78ff" stroke-width="0.5"/>
    <line x1="1000" y1="0" x2="1000" y2="400" stroke="#2b78ff" stroke-width="0.5"/>
  </g>

  <!-- Title -->
  <text class="dg-title" x="600" y="42">VANTAGE ARCHITECTURE PIPELINE</text>

  <!-- Pipeline connection lines -->
  <g marker-end="url(#dgArrow)">
    <line class="dg-conn-solid" x1="155" y1="200" x2="290" y2="200"/>
    <line class="dg-conn-solid" x1="435" y1="200" x2="570" y2="200"/>
    <line class="dg-conn-solid" x1="715" y1="200" x2="850" y2="200"/>
    <line class="dg-conn-solid" x1="995" y1="200" x2="1045" y2="140"/>
    <line class="dg-conn-solid" x1="995" y1="200" x2="1045" y2="253"/>
  </g>

  <!-- Connection labels -->
  <text class="dg-conn-label" x="222" y="188">Raw CSI</text>
  <text class="dg-conn-label" x="502" y="188">Filtered</text>
  <text class="dg-conn-label" x="782" y="188">Pose Data</text>
  <text class="dg-conn-label" x="1024" y="158">CoT</text>
  <text class="dg-conn-label" x="1024" y="242">JSON</text>

  <!-- Module 1: CSI Ingest -->
  <g filter="url(#dgBoxGlow)">
    <rect class="dg-box" x="20" y="160" width="135" height="80"/>
    <rect class="dg-box-inner" x="24" y="164" width="127" height="72"/>
    <text class="dg-label" x="87" y="197">CSI Ingest</text>
    <text class="dg-sublabel" x="87" y="216">WiFi / RF Capture</text>
    <!-- Status dot -->
    <circle cx="40" cy="177" r="3" fill="#2b78ff" class="dg-status-pulse"/>
  </g>

  <!-- Module 2: Denoise -->
  <g filter="url(#dgBoxGlow)">
    <rect class="dg-box" x="300" y="160" width="135" height="80"/>
    <rect class="dg-box-inner" x="304" y="164" width="127" height="72"/>
    <text class="dg-label" x="367" y="197">Denoise</text>
    <text class="dg-sublabel" x="367" y="216">Signal Processing</text>
    <circle cx="320" cy="177" r="3" fill="#2b78ff" class="dg-status-pulse-d"/>
  </g>

  <!-- Module 3: Pose Core -->
  <g filter="url(#dgBoxGlow)">
    <rect class="dg-box" x="580" y="160" width="135" height="80"/>
    <rect class="dg-box-inner" x="584" y="164" width="127" height="72"/>
    <text class="dg-label" x="647" y="197">Pose Core</text>
    <text class="dg-sublabel" x="647" y="216">Positioning Engine</text>
    <circle cx="600" cy="177" r="3" fill="#56b7ff" class="dg-status-pulse-d2"/>
  </g>

  <!-- Module 4: Analytics -->
  <g filter="url(#dgBoxGlow)">
    <rect class="dg-box" x="860" y="160" width="135" height="80"/>
    <rect class="dg-box-inner" x="864" y="164" width="127" height="72"/>
    <text class="dg-label" x="927" y="197">Analytics</text>
    <text class="dg-sublabel" x="927" y="216">AI / ML Processing</text>
    <circle cx="880" cy="177" r="3" fill="#56b7ff" class="dg-status-pulse-d3"/>
  </g>

  <!-- Module 5: ATAK Output -->
  <g filter="url(#dgBoxGlow)">
    <rect class="dg-box" x="1050" y="105" width="130" height="65"/>
    <rect class="dg-box-inner" x="1054" y="109" width="122" height="57"/>
    <text class="dg-label" x="1115" y="138">ATAK</text>
    <text class="dg-sublabel" x="1115" y="154">Cursor on Target</text>
  </g>

  <!-- Module 6: REST API Output -->
  <g filter="url(#dgBoxGlow)">
    <rect class="dg-box" x="1050" y="225" width="130" height="65"/>
    <rect class="dg-box-inner" x="1054" y="229" width="122" height="57"/>
    <text class="dg-label" x="1115" y="258">REST API</text>
    <text class="dg-sublabel" x="1115" y="274">JSON Endpoint</text>
  </g>

  <!-- Data flow particles -->
  <circle class="dg-particle-1" cx="0" cy="0" r="3" fill="#2b78ff"/>
  <circle class="dg-particle-1b" cx="0" cy="0" r="2" fill="#56b7ff"/>
  <circle class="dg-particle-2" cx="0" cy="0" r="3" fill="#2b78ff"/>
  <circle class="dg-particle-2b" cx="0" cy="0" r="2" fill="#56b7ff"/>
  <circle class="dg-particle-3" cx="0" cy="0" r="3" fill="#2b78ff"/>
  <circle class="dg-particle-3b" cx="0" cy="0" r="2" fill="#56b7ff"/>
  <circle class="dg-particle-4" cx="0" cy="0" r="2.5" fill="#56b7ff"/>
  <circle class="dg-particle-5" cx="0" cy="0" r="2.5" fill="#56b7ff"/>

  <!-- Bottom info bar -->
  <g opacity="0.3">
    <line x1="40" y1="350" x2="1160" y2="350" stroke="#18243a" stroke-width="1"/>
    <text x="600" y="375" fill="#80889a" font-family="'Inter', system-ui, sans-serif" font-size="10" text-anchor="middle" letter-spacing="3">CERADON SYSTEMS · VANTAGE · PASSIVE POSE INTELLIGENCE</text>
  </g>
</svg>
