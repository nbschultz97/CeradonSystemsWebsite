<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Polygen AI generative design">
  <defs>
    <linearGradient id="pgSolidGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2b78ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#56b7ff" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="pgEdgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2b78ff"/>
      <stop offset="100%" stop-color="#56b7ff"/>
    </linearGradient>
    <linearGradient id="pgFadeGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#56b7ff" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#2b78ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#2b78ff" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="pgGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="pgBrightGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Gradient mask for wireframe-to-solid transition -->
    <linearGradient id="pgTransition" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <mask id="pgSolidMask">
      <rect x="0" y="0" width="64" height="64" fill="url(#pgTransition)"/>
    </mask>
  </defs>

  <!-- Dissolving particles (bottom-left, wireframe dissolving) -->
  <g opacity="0.3">
    <circle cx="8" cy="52" r="0.6" fill="#2b78ff"/>
    <circle cx="11" cy="48" r="0.5" fill="#2b78ff"/>
    <circle cx="6" cy="46" r="0.4" fill="#56b7ff"/>
    <circle cx="14" cy="54" r="0.5" fill="#2b78ff"/>
    <circle cx="10" cy="56" r="0.3" fill="#56b7ff"/>
    <circle cx="16" cy="50" r="0.4" fill="#2b78ff"/>
    <circle cx="12" cy="58" r="0.3" fill="#2b78ff"/>
  </g>

  <!-- Wireframe mesh (back/dissolving side) -->
  <g opacity="0.35" filter="url(#pgGlow)">
    <polygon points="12,40 22,48 22,36" fill="none" stroke="#2b78ff" stroke-width="0.5"/>
    <polygon points="12,40 22,36 16,28" fill="none" stroke="#2b78ff" stroke-width="0.5"/>
    <polygon points="16,28 22,36 28,28" fill="none" stroke="#2b78ff" stroke-width="0.4"/>
    <polygon points="22,48 22,36 32,42" fill="none" stroke="#2b78ff" stroke-width="0.4"/>
  </g>

  <!-- Main polyhedron - solid faces (right/top side) -->
  <g mask="url(#pgSolidMask)">
    <!-- Top face -->
    <polygon points="32,8 48,18 38,24 22,16" fill="url(#pgSolidGrad)" stroke="url(#pgEdgeGrad)" stroke-width="0.8"/>
    <!-- Right face -->
    <polygon points="48,18 52,34 42,42 38,24" fill="url(#pgSolidGrad)" stroke="url(#pgEdgeGrad)" stroke-width="0.8"/>
    <!-- Front face -->
    <polygon points="38,24 42,42 28,48 22,30" fill="url(#pgSolidGrad)" stroke="url(#pgEdgeGrad)" stroke-width="0.7"/>
  </g>

  <!-- Main polyhedron - wireframe overlay -->
  <g filter="url(#pgGlow)">
    <!-- Full wireframe edges -->
    <polygon points="32,8 48,18 52,34 42,42 28,48 22,30 22,16" fill="none" stroke="url(#pgFadeGrad)" stroke-width="1" stroke-linejoin="round"/>
    <!-- Internal edges -->
    <line x1="38" y1="24" x2="32" y2="8" stroke="#56b7ff" stroke-width="0.6" opacity="0.5"/>
    <line x1="38" y1="24" x2="48" y2="18" stroke="#56b7ff" stroke-width="0.6" opacity="0.6"/>
    <line x1="38" y1="24" x2="52" y2="34" stroke="#56b7ff" stroke-width="0.5" opacity="0.4"/>
    <line x1="38" y1="24" x2="42" y2="42" stroke="#56b7ff" stroke-width="0.5" opacity="0.4"/>
    <line x1="38" y1="24" x2="22" y2="30" stroke="#2b78ff" stroke-width="0.5" opacity="0.3"/>
    <line x1="38" y1="24" x2="22" y2="16" stroke="#2b78ff" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- Vertices with glow -->
  <g filter="url(#pgBrightGlow)">
    <circle cx="32" cy="8" r="1.8" fill="#56b7ff" opacity="0.9"/>
    <circle cx="48" cy="18" r="1.8" fill="#56b7ff" opacity="0.8"/>
    <circle cx="52" cy="34" r="1.5" fill="#2b78ff" opacity="0.7"/>
    <circle cx="42" cy="42" r="1.5" fill="#2b78ff" opacity="0.6"/>
    <circle cx="28" cy="48" r="1.2" fill="#2b78ff" opacity="0.4"/>
    <circle cx="22" cy="30" r="1.2" fill="#2b78ff" opacity="0.35"/>
    <circle cx="22" cy="16" r="1.2" fill="#2b78ff" opacity="0.3"/>
  </g>

  <!-- Central vertex (brightest) -->
  <g filter="url(#pgBrightGlow)">
    <circle cx="38" cy="24" r="2.5" fill="#111a2c" stroke="url(#pgEdgeGrad)" stroke-width="1"/>
    <circle cx="38" cy="24" r="1" fill="#f4f6fb"/>
  </g>

  <!-- AI sparkle indicators (top-right) -->
  <g opacity="0.5">
    <line x1="52" y1="8" x2="52" y2="14" stroke="#56b7ff" stroke-width="0.5"/>
    <line x1="49" y1="11" x2="55" y2="11" stroke="#56b7ff" stroke-width="0.5"/>
    <line x1="58" y1="4" x2="58" y2="8" stroke="#56b7ff" stroke-width="0.4"/>
    <line x1="56" y1="6" x2="60" y2="6" stroke="#56b7ff" stroke-width="0.4"/>
  </g>
</svg>
